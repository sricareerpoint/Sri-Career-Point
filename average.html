<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Average Questions - Sri Career Point</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #004aad;
    }

    .question {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-left: 5px solid #0d6efd;
    }

    button {
      background: #004aad;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    .answer {
      display: none;
      margin-top: 15px;
      background: #eef6ff;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>📊 Average - 50 Practice Questions</h1>

<div id="questions"></div>

<script>
const questions = [
["Find the average of 10, 20 and 30.", "20", "(10 + 20 + 30) ÷ 3 = 60 ÷ 3 = 20"],
["Find the average of 5, 10, 15 and 20.", "12.5", "50 ÷ 4 = 12.5"],
["Average of 12 and 18 is?", "15", "(12 + 18) ÷ 2 = 15"],
["Find the average of 20, 30, 40.", "30", "90 ÷ 3 = 30"],
["Average of first 5 natural numbers?", "3", "(1+2+3+4+5) ÷ 5 = 3"],
["Find average of 15, 25, 35, 45.", "30", "120 ÷ 4 = 30"],
["Average of 8, 12 and 16?", "12", "36 ÷ 3 = 12"],
["Average of 50 and 70?", "60", "120 ÷ 2 = 60"],
["Find average of 21, 23, 25.", "23", "69 ÷ 3 = 23"],
["Average of 100, 200, 300?", "200", "600 ÷ 3 = 200"],

["Average of 5 numbers is 20. Find their sum.", "100", "Sum = Average × Number = 20 × 5 = 100"],
["Average of 8 numbers is 15. Find sum.", "120", "15 × 8 = 120"],
["Sum of 6 numbers is 180. Find average.", "30", "180 ÷ 6 = 30"],
["Sum of 10 numbers is 250. Find average.", "25", "250 ÷ 10 = 25"],
["Average of 4 numbers is 25. Find total.", "100", "25 × 4 = 100"],
["Average of 7 numbers is 12. Find sum.", "84", "12 × 7 = 84"],
["Sum of 9 numbers is 270. Find average.", "30", "270 ÷ 9 = 30"],
["Average of 12 numbers is 10. Find sum.", "120", "12 × 10 = 120"],
["Sum of 5 numbers is 125. Find average.", "25", "125 ÷ 5 = 25"],
["Average of 20 numbers is 5. Find sum.", "100", "20 × 5 = 100"],

["Average age of 5 students is 18 years. Find total age.", "90 years", "18 × 5 = 90"],
["Average age of 4 boys is 20 years. Find total age.", "80 years", "20 × 4 = 80"],
["Total age of 6 students is 120. Find average age.", "20 years", "120 ÷ 6 = 20"],
["Average age of 10 persons is 25. Find total age.", "250 years", "25 × 10 = 250"],
["Average age of 8 players is 22. Find total age.", "176 years", "22 × 8 = 176"],
["Average marks of 5 students is 60. Find total marks.", "300", "60 × 5 = 300"],
["Total marks of 4 students is 320. Find average.", "80", "320 ÷ 4 = 80"],
["Average marks in 6 subjects is 70. Find total marks.", "420", "70 × 6 = 420"],
["Average score of 10 players is 40. Find total score.", "400", "40 × 10 = 400"],
["Total score is 450 for 9 players. Find average.", "50", "450 ÷ 9 = 50"],

["Average of first 10 natural numbers?", "5.5", "(1 + 10) ÷ 2 = 5.5"],
["Average of numbers from 1 to 20?", "10.5", "(1 + 20) ÷ 2 = 10.5"],
["Average of first 5 even numbers?", "6", "2,4,6,8,10. Average = 30 ÷ 5 = 6"],
["Average of first 5 odd numbers?", "5", "1,3,5,7,9. Average = 25 ÷ 5 = 5"],
["Average of 10, 20, 30, 40, 50?", "30", "150 ÷ 5 = 30"],
["Average of consecutive numbers 11,12,13,14,15?", "13", "Middle number = 13"],
["Average of 25, 30 and 35?", "30", "Middle value = 30"],
["Average of 40, 50, 60, 70, 80?", "60", "300 ÷ 5 = 60"],
["Average of 2, 4, 6, 8, 10, 12?", "7", "42 ÷ 6 = 7"],
["Average of 3, 6, 9, 12, 15?", "9", "45 ÷ 5 = 9"],

["Average of 5 numbers is 30. If one number is removed, average of remaining 4 is 25. Find removed number.", "50", "Total = 150. Remaining = 100. Removed = 50"],
["Average of 6 numbers is 20. One number 30 is removed. Find new average.", "18", "Total = 120. Remaining = 90. 90 ÷ 5 = 18"],
["Average of 4 numbers is 15. A number 20 is added. Find new average.", "16", "Old total = 60. New total = 80. 80 ÷ 5 = 16"],
["Average of 5 students is 40. A student with 50 marks joins. Find new average.", "41.67", "Total = 200 + 50 = 250. 250 ÷ 6 = 41.67"],
["Average age of 10 persons is 30. One person aged 40 leaves. Find new average.", "28.89 years", "Total = 300 - 40 = 260. 260 ÷ 9 = 28.89"],
["Average of 8 numbers is 25. If 30 is replaced by 50, find new average.", "27.5", "Old total = 200. Increase = 20. New total = 220. 220 ÷ 8 = 27.5"],
["Average salary of 5 workers is ₹20,000. Find total salary.", "₹1,00,000", "20,000 × 5 = ₹1,00,000"],
["Average runs of a batsman in 5 matches is 40. He scores 60 in 6th match. Find new average.", "43.33", "Old total = 200. New total = 260. 260 ÷ 6 = 43.33"],
["Average of 7 consecutive numbers is 20. Find middle number.", "20", "Average of consecutive numbers = middle number"],
["Average of 9 consecutive odd numbers is 25. Find middle number.", "25", "For consecutive odd numbers, average = middle number"]
];

const container = document.getElementById("questions");

questions.forEach((q, index) => {
  container.innerHTML += `
    <div class="question">
      <h3>Question ${index + 1}</h3>
      <p>${q[0]}</p>

      <button onclick="showAnswer(${index})">
        Show Answer
      </button>

      <div class="answer" id="answer${index}">
        <b>Answer:</b> ${q[1]}<br><br>
        <b>Explanation:</b> ${q[2]}
      </div>
    </div>
  `;
});

function showAnswer(index) {
  const answer = document.getElementById("answer" + index);

  if (answer.style.display === "block") {
    answer.style.display = "none";
  } else {
    answer.style.display = "block";
  }
}
</script>

</body>
</html>
